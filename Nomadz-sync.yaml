name: NOMADZ-0 Sync & Train
on:
  push:
    paths: ['src/**', 'data/**', 'godot/**']
  schedule:
    - cron: '0 */6 * * *'  # 6h retrain

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install & Test
      run: |
        pip install -r requirements.txt pytest
        pytest tests/
    - name: Fetch Data & Train
      run: python src/train.py --epochs=1
    - name: Deploy HF
      run: |
        pip install huggingface_hub
        huggingface-cli login --token ${{ secrets.HF_TOKEN }}
        python src/push_model.py  # HF repo: ovbslaught/nomadz-complexity
    - name: Drive Sync
      uses: betaeta/rclone-action@v1
      with:
        rclone_version: latest
        rclone_command: sync . gdrive:NOMADZ-0/
        config_file: rclone.conf.base64  # From secrets

  godot-export:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: GodotEngine/godot-actions/ci@v4
      with:
        godot-version: 4.3
        export: linux  # Test complexity tool
    - run: zip -r godot-build.zip godot/
    - uses: actions/upload-artifact@v4
      with: artifact: godot-build.zip