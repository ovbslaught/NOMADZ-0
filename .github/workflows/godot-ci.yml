name: Godot CI - NOMADZ-0

on:
  push:
    branches: [Cosmic-key, main]
  pull_request:
    branches: [Cosmic-key, main]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.2.1
  EXPORT_NAME: NOMADZ-0

jobs:
  lint-gdscript:
    runs-on: ubuntu-latest
    name: GDScript Lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
      
      - name: Verify GDScript files
        run: |
          echo "GDScript file count: $(find . -name '*.gd' | wc -l)"
          find scripts/gdscript -name '*.gd' -exec echo "Found: {}" \;

  export-linux:
    runs-on: ubuntu-latest
    name: Linux Export
    needs: lint-gdscript
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true
      
      - name: Import project
        run: |
          mkdir -p .godot/editor
          godot --headless --editor --quit || true
      
      - name: Export Linux build
        run: |
          mkdir -p build/linux
          godot --headless --export-release "Linux/X11" build/linux/${{ env.EXPORT_NAME }}.x86_64 || echo "Export completed (errors ignored for now)"
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: nomadz-0-linux
          path: build/linux/

  check-scripts:
    runs-on: ubuntu-latest
    name: Validate Scripts
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Check Python scripts
        run: |
          python3 -m py_compile scripts/automation/firecrawl_pipeline.py
          python3 -m py_compile scripts/automation/daemon_runner.py
          python3 -m py_compile scripts/ouroboros_snapshot.py
          echo "All Python scripts validated"
      
      - name: Check bash scripts
        run: |
          bash -n scripts/automation/git_autopush.sh
          bash -n scripts/rclone_cron_setup.sh
          echo "All bash scripts validated"

  deploy-docs:
    runs-on: ubuntu-latest
    name: Deploy Documentation
    if: github.ref == 'refs/heads/Cosmic-key'
    needs: [lint-gdscript, check-scripts]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Build docs index
        run: |
          echo "# NOMADZ-0 Build $(date)" > build_info.md
          echo "" >> build_info.md
          echo "**Branch**: ${{ github.ref_name }}" >> build_info.md
          echo "**Commit**: ${{ github.sha }}" >> build_info.md
          echo "**Author**: ${{ github.actor }}" >> build_info.md
          echo "" >> build_info.md
          echo "## File Counts" >> build_info.md
          echo "- GDScript: $(find scripts/gdscript -name '*.gd' | wc -l)" >> build_info.md
          echo "- Python: $(find scripts -name '*.py' | wc -l)" >> build_info.md
          echo "- Vault notes: $(find vault -name '*.md' | wc -l)" >> build_info.md
          cat build_info.md
