name: NOMADZ-0 Unified Feeder

on:
  schedule:
    - cron: '0 */4 * * *'
  push:
    branches:
      - main
    paths:
      - 'feeds/**'
      - '.github/workflows/nomadz-feeder.yml'
  workflow_dispatch:
    inputs:
      trigger_source:
        description: 'Which repo triggered this feed'
        required: false
        type: string
        default: 'manual'

permissions:
  contents: write

jobs:
  aggregate-feed:
    runs-on: ubuntu-latest
    name: Aggregate all repo feeds into NOMADZ-0
    timeout-minutes: 45

    steps:
      - name: Checkout NOMADZ-0
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            feeds
            .github
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "NOMADZ-0 Feeder Bot"
          git config user.email "ovbslaught@gmail.com"

      - name: Create feed directory structure
        run: |
          mkdir -p feeds/cosmic-key feeds/mother-brain feeds/nomadz-wiki feeds/sync-status feeds/metadata

      - name: Fetch Cosmic-key feed data
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RAW=$(curl -sf -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/ovbslaught/Cosmic-key/contents/wormhole-data/sync-status.json" 2>/dev/null)
          if [ -n "$RAW" ]; then
            echo "$RAW" | jq -r '.content' | base64 -d > feeds/cosmic-key/sync-status.json 2>/dev/null \
              || echo '{"error":"decode failed"}' > feeds/cosmic-key/sync-status.json
          else
            echo '{"error":"fetch failed","source":"Cosmic-key"}' > feeds/cosmic-key/sync-status.json
          fi

      - name: Fetch MOTHER-BRAIN feed data
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RAW=$(curl -sf -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/ovbslaught/MOTHER-BRAIN/contents/wormhole-sync/sync-status.json" 2>/dev/null)
          if [ -n "$RAW" ]; then
            echo "$RAW" | jq -r '.content' | base64 -d > feeds/mother-brain/sync-status.json 2>/dev/null \
              || echo '{"error":"decode failed"}' > feeds/mother-brain/sync-status.json
          else
            echo '{"error":"fetch failed","source":"MOTHER-BRAIN"}' > feeds/mother-brain/sync-status.json
          fi

      - name: Fetch repo metadata
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for repo in NOMADZ-0 Cosmic-key MOTHER-BRAIN NOMADZ-0-WIKI remotely-save ocean; do
            curl -sf -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/ovbslaught/$repo" \
              > feeds/metadata/${repo}.json 2>/dev/null \
              || echo '{"error":"fetch failed"}' > feeds/metadata/${repo}.json
          done

      - name: Generate master feed index
        env:
          TRIGGER_INPUT: ${{ github.event.inputs.trigger_source }}
          RUN_ID: ${{ github.run_id }}
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          TRIGGER=${TRIGGER_INPUT:-scheduled}
          jq -n \
            --arg v "1.0" \
            --arg ts "$TIMESTAMP" \
            --arg tr "$TRIGGER" \
            --arg rid "$RUN_ID" \
            --argjson repos '["NOMADZ-0","Cosmic-key","MOTHER-BRAIN","NOMADZ-0-WIKI","remotely-save","ocean"]' \
            '{nomadz_feed_version:$v,generated_at:$ts,trigger:$tr,run_id:$rid,repos_monitored:$repos}' \
            > feeds/sync-status/master-index.json
          cat feeds/sync-status/master-index.json

      - name: Generate workflow summary
        run: |
          echo "## NOMADZ-0 Unified Feed" >> "$GITHUB_STEP_SUMMARY"
          echo "**Generated:** $(date -u)" >> "$GITHUB_STEP_SUMMARY"
          echo "### Repos Aggregated" >> "$GITHUB_STEP_SUMMARY"
          echo "- NOMADZ-0, Cosmic-key, MOTHER-BRAIN, NOMADZ-0-WIKI, remotely-save, ocean" >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push feeds to NOMADZ-0 main
        run: |
          git add feeds/
          if git diff --staged --quiet; then
            echo "No feed changes to commit"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "feed update: $TIMESTAMP [NOMADZ-0 origin/main]"
            git push origin main
          fi
