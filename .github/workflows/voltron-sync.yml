name: "VCN-1.6 TRI-BRIDGE SYNC — NOMADZ-0 -> Google Drive Wormhole"
on:
  push:
    branches:
      - Cosmic-key
      - main
  workflow_dispatch:
    inputs:
      trigger_source:
        description: 'Which system triggered this sync'
        required: false
        type: string
jobs:
  sync-to-vault:
    runs-on: ubuntu-latest
    name: Sync NOMADZ-0 to MOTHER-BRAIN Wormhole (Google Drive)
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Upload to Google Drive Wormhole
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GOOGLE }}
          filename: "./*"
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          overwrite: "true"
          mirrorDirectoryStructure: "true"
      - name: Log sync event
        run: |
          echo "[$(date -u)] NOMADZ-0 synced to Wormhole by: ${{ github.actor }}" >> sync_log.txt
          echo "Trigger: ${{ github.event_name }} | Source: ${{ github.event.inputs.trigger_source }}" >> sync_log.txt
          cat sync_log.txt

# SETUP REQUIRED:
# GitHub Secrets:
#   GOOGLE = Google Service Account JSON key file contents (base64 encoded)
#   GDRIVE_FOLDER_ID = Google Drive folder ID for MOTHER-BRAIN-MASTER-RECORD
# Drive Path: ROOT/Wormhole/MOTHER-BRAIN/MOTHER-BRAIN-MASTER-RECORD
# Ref: NOMADZ-0 Issue #2 (BRAIN-DUMP)
