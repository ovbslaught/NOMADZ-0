name: Publish NOMADZ-0 to Itch.io

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  IS_MAIN: ${{ contains(github.ref, 'main') }}
  PROJECT_NAME: "NOMADZ-0"
  GODOT_VERSION: "4.3"

jobs:
  Export:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download + Authorize Godot
        run: |
          curl -L -o godot.zip https://downloads.tuxfamily.org/godotengine/${GODOT_VERSION}/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          unzip godot.zip
          mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 godot
          chmod +x godot
          ./godot --version

      - name: Download Export Templates
        run: |
          curl -L -o export_templates.tpz https://downloads.tuxfamily.org/godotengine/${GODOT_VERSION}/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          unzip export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          mv ./templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Create export dirs
        run: mkdir -p exports/linux exports/windows

      - name: Export Linux Build
        run: |
          ./godot --headless --export-release "Linux/X11" exports/linux/${PROJECT_NAME}.x86_64 || true

      - name: Upload exports artifact
        uses: actions/upload-artifact@v4
        with:
          name: exports
          path: exports/

  Release:
    needs: Export
    if: ${{ contains(github.ref, 'main') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Exports
        uses: actions/download-artifact@v4
        with:
          name: exports
          path: exports

      - name: Compute version tag
        id: tag_version
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo $LATEST | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo $LATEST | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo $LATEST | sed 's/v//' | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "new_version=${MAJOR}.${MINOR}.${NEW_PATCH}" >> $GITHUB_OUTPUT

      - name: Zip exports
        run: zip -r release-${{ steps.tag_version.outputs.new_tag }}.zip exports

      - name: Create GitHub Release
        run: |
          gh release create ${{ steps.tag_version.outputs.new_tag }} \
            release-${{ steps.tag_version.outputs.new_tag }}.zip \
            --title "Release ${{ steps.tag_version.outputs.new_tag }}" \
            --notes "Automated release ${{ steps.tag_version.outputs.new_tag }}" \
            --target main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write VERSION.txt
        run: echo "${{ steps.tag_version.outputs.new_version }}" > VERSION.txt

      - name: Upload VERSION artifact
        uses: actions/upload-artifact@v4
        with:
          name: VERSION
          path: VERSION.txt

  Publish:
    needs: Release
    if: ${{ contains(github.ref, 'main') && secrets.BUTLER_API_KEY != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: exports
          path: exports

      - name: Download + Authorize Butler
        run: |
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Push to Itch.io
        run: |
          ./butler push exports/linux ovbslaught/nomadz-0:linux
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
