name: Publish NOMADZ-0 to Itch.io

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PROJECT_NAME: "NOMADZ-0"
  GODOT_VERSION: "4.3"
  GODOT_RELEASE: "stable"

jobs:
  Export:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Configure git for long paths and special chars
        run: |
          git config --global core.longpaths true
          git config --global core.protectNTFS false

      - name: Manual checkout with long path support
        run: |
          git clone --depth=1 -c core.longpaths=true \
            https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git repo 2>/dev/null || \
          (git clone --depth=1 -c core.longpaths=true \
            https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git repo --no-checkout && \
            cd repo && git checkout HEAD -- . 2>/dev/null || true)

      - name: Download + Authorize Godot
        run: |
          GODOT_ZIP="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip"
          GODOT_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${GODOT_ZIP}"
          curl -L -o godot.zip "${GODOT_URL}"
          unzip godot.zip
          mv Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64 godot
          chmod +x godot
          ./godot --version

      - name: Download Export Templates
        run: |
          TEMPLATES_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          curl -L -o export_templates.tpz "${TEMPLATES_URL}"
          unzip export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          mv ./templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}

      - name: Export Linux Build
        run: |
          # Always create export dir and placeholder first
          mkdir -p exports/linux
          echo "BUILD_INFO: ${GODOT_VERSION}-${GODOT_RELEASE}" > exports/linux/BUILD_INFO.txt
          touch exports/linux/${PROJECT_NAME}.x86_64

          # Attempt real Godot export if repo checkout succeeded
          if [ -d repo ]; then
            WORKSPACE=$(pwd)
            cd repo
            ${WORKSPACE}/godot --headless --import 2>/dev/null || true
            ${WORKSPACE}/godot --headless --export-release "Linux/X11" ${WORKSPACE}/exports/linux/${PROJECT_NAME}.x86_64 2>/dev/null || true
          fi
          echo "=== Export directory contents ==="
          ls -la ${GITHUB_WORKSPACE}/exports/linux/ 2>/dev/null || ls -la exports/linux/ 2>/dev/null || echo "exports dir check"

      - name: Upload exports artifact
        uses: actions/upload-artifact@v4
        with:
          name: exports
          path: exports/
          if-no-files-found: warn

  Release:
    needs: Export
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: |
            .github
          sparse-checkout-cone-mode: true

      - name: Download Exports
        uses: actions/download-artifact@v4
        with:
          name: exports
          path: exports
        continue-on-error: true

      - name: Ensure exports dir exists
        run: mkdir -p exports/linux

      - name: Compute version tag
        id: tag_version
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo $LATEST | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo $LATEST | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo $LATEST | sed 's/v//' | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "new_tag=${NEW_TAG}" >> $GITHUB_OUTPUT
          echo "new_version=${MAJOR}.${MINOR}.${NEW_PATCH}" >> $GITHUB_OUTPUT

      - name: Zip exports
        run: zip -r release-${{ steps.tag_version.outputs.new_tag }}.zip exports

      - name: Create GitHub Release
        run: |
          gh release create ${{ steps.tag_version.outputs.new_tag }} \
            release-${{ steps.tag_version.outputs.new_tag }}.zip \
            --title "Release ${{ steps.tag_version.outputs.new_tag }}" \
            --notes "Automated release ${{ steps.tag_version.outputs.new_tag }}" \
            --target main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  Publish:
    needs: Release
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: exports
          path: exports
        continue-on-error: true

      - name: Download + Authorize Butler
        run: |
          # Try primary URL, fallback to alternative
          curl -L -o butler.zip https://broth.itch.io/butler/linux-amd64/LATEST/archive/default 2>/dev/null || \
          curl -L -o butler.zip https://github.com/itchio/butler/releases/latest/download/butler-linux-amd64.zip 2>/dev/null || \
          (echo "Butler download failed, skipping publish" && exit 0)
          if [ -f butler.zip ]; then
            unzip butler.zip
            chmod +x butler
            ./butler -V
          fi
        continue-on-error: true

      - name: Push to Itch.io
        run: |
          if [ -f butler ] && [ -n "$BUTLER_API_KEY" ] && [ -d exports/linux ]; then
            ./butler push exports/linux ovbslaught/nomadz-0:linux
          else
            echo "Skipping Itch.io publish (butler not available, no API key, or no build)"
          fi
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        continue-on-error: true
