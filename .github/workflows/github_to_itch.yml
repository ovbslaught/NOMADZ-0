name: Publish NOMADZ-0 to Itch.io

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      channel:
        description: 'Itch.io channel to upload to'
        required: false
        type: string
        default: 'windows'

env:
  BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  IS_MAIN: ${{ contains(github.ref, 'main') }}
  PROJECT_NAME: "NOMADZ-0"
  GODOT_VERSION: "4.2.1"

jobs:
  CleanArtifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: kolpav/purge-artifacts-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          expire-in: 1hr

  Export:
    needs: CleanArtifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download + Authorize Godot
        run: |
          curl -L -o godot.zip https://downloads.tuxfamily.org/godotengine/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip
          unzip -qq godot.zip
          chmod +x Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64
          mkdir -p ~/.local/bin
          mv Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64 ~/.local/bin/godot
          echo "Godot $(godot --version) installed"

      - name: Download Export Templates
        run: |
          curl -L -o export_templates.tpz https://downloads.tuxfamily.org/godotengine/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          cd ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          unzip -qq ~/export_templates.tpz
          mv templates/* . 2>/dev/null || true
          echo "Export templates installed for ${{ env.GODOT_VERSION }}"

      - name: Validate project.godot
        run: |
          if [ ! -f "project.godot" ]; then
            echo "::error::project.godot not found in repo root"
            exit 1
          fi
          godot --headless --editor --quit || echo "Godot init completed"
          echo "Project validated"

      - name: Export Linux build
        run: |
          mkdir -p exports/linux
          godot --headless --export-release "Linux/X11" exports/linux/${{ env.PROJECT_NAME }}.x86_64
          if [ -f "exports/linux/${{ env.PROJECT_NAME }}.x86_64" ]; then
            echo "Linux export successful: $(ls -lh exports/linux/${{ env.PROJECT_NAME }}.x86_64)"
          else
            echo "::error::Linux export failed - file not created"
            exit 1
          fi

      - name: Export Windows build
        run: |
          mkdir -p exports/windows
          godot --headless --export-release "Windows Desktop" exports/windows/${{ env.PROJECT_NAME }}.exe
          if [ -f "exports/windows/${{ env.PROJECT_NAME }}.exe" ]; then
            echo "Windows export successful: $(ls -lh exports/windows/${{ env.PROJECT_NAME }}.exe)"
          else
            echo "::warning::Windows export may have failed"
          fi

      - name: Upload exports artifact
        uses: actions/upload-artifact@v4
        with:
          name: nomadz-0-exports
          path: exports/
          retention-days: 7

  Publish-Itch:
    needs: Export
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: nomadz-0-exports
          path: exports/

      - name: Install butler
        run: |
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Push to Itch.io
        run: |
          CHANNEL="${{ github.event.inputs.channel || 'windows' }}"
          echo "Pushing $CHANNEL build to Itch.io..."
          if [ -f "exports/windows/${{ env.PROJECT_NAME }}.exe" ]; then
            ./butler push exports/windows/${{ env.PROJECT_NAME }}.exe ovbslaught/${{ env.PROJECT_NAME }}:$CHANNEL --userversion $(git rev-parse --short HEAD)
          else
            echo "::warning::No Windows build found for Itch upload"
          fi

  Notify-Discord:
    needs: [Export, Publish-Itch]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Send Discord notification
        if: env.DISCORD_WEBHOOK != ''
        run: |
          STATUS="${{ needs.Export.result }}"
          PUBLISH_STATUS="${{ needs.Publish-Itch.result }}"
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"content\": \"NOMADZ-0 Build: $STATUS | Itch: $PUBLISH_STATUS | Commit: ${GITHUB_SHA:0:7}\"}" \
            "$DISCORD_WEBHOOK"
